<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Yewchat!</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #16213e;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #0f3460;
        }

        .login-box h1 { color: #e94560; }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 12px 0;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: #0f3460;
            color: white;
            font-size: 16px;
        }

        .login-box button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .login-box button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .chat-container {
            display: flex;
            height: 100vh;
        }

        .users-panel {
            width: 200px;
            background: #16213e;
            padding: 20px;
            border-right: 1px solid #0f3460;
        }

        .user-item {
            margin: 8px 0;
            font-size: 14px;
        }

        .online-dot { color: #4caf50; margin-right: 6px; }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message-bubble {
            background: #16213e;
            border-radius: 12px;
            padding: 10px 14px;
            margin: 8px 0;
            max-width: 70%;
        }

        .message-from {
            font-size: 12px;
            color: #e94560;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        .input-area {
            display: flex;
            padding: 16px;
            background: #16213e;
            gap: 10px;
            border-top: 1px solid #0f3460;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: #0f3460;
            color: white;
            font-size: 14px;
        }

        .input-area button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<script src="yewchat.js"></script>
</body>
</html>
